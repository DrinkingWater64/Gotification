version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gotification
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gotification"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - DB_CONN=postgres://postgres:password@db:5432/gotification?sslmode=disable
      - NATS_URL=nats://nats:4222
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_started

  dummy:
    build: 
      context: .
      dockerfile: Dockerfile.dummy
    ports:
      - "8081:8081"

  nats:
    image: nats:alpine
    ports:
      - "4222:4222"

  worker:
    build: 
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - DB_CONN=postgres://postgres:password@db:5432/gotification?sslmode=disable
      - NATS_URL=nats://nats:4222
      - DUMMY_URL=http://dummy:8081/process
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_started

volumes:
  postgres_data:
